<!DOCTYPE html>
<html lang="en">
    <head>
        <title>backtrace | Login</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/files/login.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="/files/icon.ico">
        <script type="module" src="/files/login.js" defer></script>
    </head>
    <body>
        <div class="wrapper">
            <button type="button" class="back-icon animated fade_in delay05" onclick="history.back()">
                <i class="fa-solid fa-angle-left"></i>
            </button>
            <div class="form animated fade_in_up">
                <div class="name">Backtrace</div>
                <h2>Sign in</h2>
                <p>Username</p>
                <input type="text" name="username" id="input#username" placeholder="username" autocomplete="off" autocapitalize="false" spellcheck="false" autocorrect="off">
                <p>Password</p>
                <input type="password" name="password" id="input#password" placeholder="********">
                <button type="button" id="button#submit">Submit</button>
            </div>
        </div>
    </body>
</html>
