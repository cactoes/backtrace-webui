<!DOCTYPE html>
<html lang="en">
    <head>
        <title>backtrace | Home</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/files/home.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="/files/icon.ico">
        <script type="module" src="/files/home.js" defer></script>
    </head>
    <body>
        <main id="main" class="container">
            <header class="top-bar animated fade_in">
                <div class="logo">
                    <svg width="32px" height="32px" viewBox="0 0 75.99 75.99" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" version="1.1" baseProfile="full" enable-background="new 0 0 75.99 75.99" xml:space="preserve">
                        <path fill="#ffffff" fill-opacity="1" stroke-width="0.2" stroke-linejoin="round" d="M 41.1615,61.029C 28.0464,61.029 17.4145,50.3971 17.4145,37.2819C 17.4145,26.1675 25.0501,16.8364 35.3618,14.2482C 31.1173,18.5382 28.4964,24.4377 28.4964,30.9494C 28.4964,44.0645 39.1284,54.6964 52.2435,54.6964C 54.2442,54.6964 56.1871,54.449 58.0432,53.9831C 53.739,58.3336 47.765,61.029 41.1615,61.029 Z "/>
                    </svg>
                    BT Ltd.
                </div>
                <nav>
                    <a class="pfp" href="/account"><img id="i#pfp"></a>
                </nav>
            </header>

            <h2 class="section-title animated fade_in delay02">Services</h2>

            <section class="section animated fade_in_up delay02">
                <span class="card" id="item#account" onclick="window.open('/account', '_self')">
                    <div class="card-header">
                        <i class="fa-solid fa-user"></i>
                        <p>Account</p>
                    </div>
                    <div class="card-footer">
                        <div class="card-footer-icon">
                            <i class="fa-solid fa-angle-right"></i>
                        </div>
                    </div>
                </span>

                <span class="card" id="item#services" onclick="window.open('/services', '_self')">
                    <div class="card-header">
                        <i class="fa-solid fa-server"></i>
                        <p>Services</p>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <h2 id="il#services">-</h2>
                            <p>Services</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="card-footer-icon">
                            <i class="fa-solid fa-angle-right"></i>
                        </div>
                    </div>
                </span>

                <span class="card" id="item#lists" onclick="window.open('/lists', '_self')">
                    <div class="card-header">
                        <i class="fa-solid fa-list"></i>
                        <p>Lists</p>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <h2 id="il#anime">-</h2>
                            <p>Anime's</p>
                        </div>
                        <div class="stat">
                            <h2 id="il#manga">-</h2>
                            <p>Manga's</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="card-footer-icon">
                            <i class="fa-solid fa-angle-right"></i>
                        </div>
                    </div>
                </span>

                <span class="card" id="item#passwords" onclick="window.open('/passwords', '_self')">
                    <div class="card-header">
                        <i class="fa-solid fa-lock"></i>
                        <p>Passwords</p>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <h2>hidden</h2>
                            <p>Passwords</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="card-footer-icon">
                            <i class="fa-solid fa-angle-right"></i>
                        </div>
                    </div>
                </span>

                <span class="card" id="item#streaming" onclick="window.open('/streaming', '_self')">
                    <div class="card-header">
                        <i class="fa-solid fa-tv"></i>
                        <p>Streaming</p>
                    </div>
                    <div class="card-stats">
                        <div class="stat">
                            <h2 id="il#shows">-</h2>
                            <p>Shows</p>
                        </div>
                        <div class="stat">
                            <h2 id="il#episodes">-</h2>
                            <p>Episodes</p>
                        </div>
                    </div>
                    <div class="card-footer">
                        <div class="card-footer-icon">
                            <i class="fa-solid fa-angle-right"></i>
                        </div>
                    </div>
                </span>
            </section>

            <footer class="animated fade_in_up delay1">
                <p id="ver" class="version"></p>
                <p id="time" class="time"></p>
            </footer>
        </main>
    </body>
</html>
