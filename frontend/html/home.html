<!DOCTYPE html>
<html lang="en">
    <head>
        <title>backtrace | Home</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/files/home.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="/files/icon.ico">
        <script src="/files/global.js" defer></script>
        <script src="/files/home.js" defer></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <div id="ver"></div>
        <div class="topbar">
            <div class="route">
                <a href="/home">BACKTRACE</a>
                <p>/</p>
                <p>HOME</p>
            </div>
            <div class="profile">
                <img id="i#pfp">
            </div>
        </div>
        <div class="content">
            <div id="item#account" class="item" link="account">
                <div class="header">
                    <i class="fa-solid fa-user"></i>
                    <p>Account</p>
                </div>
            </div>
            <div id="item#lists" class="item" link="lists">
                <div class="header">
                    <i class="fa-solid fa-list"></i>
                    <p>Lists</p>
                </div>
                <div class="info">
                    <div class="stat">
                        <h2 id="il#anime"></h2>
                        <p>Anime's</p>
                    </div>
                    <div class="stat">
                        <h2 id="il#manga"></h2>
                        <p>Manga's</p>
                    </div>
                </div>
            </div>
            <div id="item#passwords" class="item" link="passwords">
                <div class="header">
                    <i class="fa-solid fa-lock"></i>
                    <p>Passwords</p>
                </div>
                <div class="info">
                    <div class="stat">
                        <h2>-</h2>
                        <p>Passwords</p>
                    </div>
                </div>
            </div>
            <div id="item#services" class="item" link="services">
                <div class="header">
                    <i class="fa-solid fa-server"></i>
                    <p>Services</p>
                </div>
                <div class="info">
                    <div class="stat">
                        <h2>-</h2>
                        <p>Services</p>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
