<!DOCTYPE html>
<html lang="en">
    <head>
        <title>backtrace | Lists</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/files/lists.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="/files/icon.ico">
        <script src="/files/global.js" defer></script>
        <script src="/files/lists.js" defer></script>
    </head>
    <body>
        <div class="sidebar"></div>
        <div class="page">
            <div class="topbar">
                <div id="navigation" class="navigation noselect">
                    <p>backtrace</p>
                    <div class="slice">/</div>
                </div>
            </div>
            <div class="content">
                <div class="filter_wrapper">
                    <div class="dropdown" id="type">
                        <button id="button#dropdown" class="dropdown_selector"><span>Anime</span><i class="fa-solid fa-angle-down"></i></button>
                        <div id="div#options" class="options">
                            <a>Anime</a>
                            <a>Manga</a>
                        </div>
                    </div>
                    <div id="div#filters" class="filters noselect">
                        <p class="filter finished">Finished</p>
                        <p class="filter watching">Watching</p>
                        <p class="filter planned">Planned</p>
                        <p class="filter dropped">Dropped</p>
                        <p class="filter clear">clear<i class="fa-solid fa-xmark"></i></p>
                    </div>
                </div>
                <div id="list">
                    <div class="heading">
                        <p class="name">Name</p>
                        <p class="status">Status</p>
                        <p class="note">Note</p>
                        <p class="edit"></p>
                    </div>
                    <div class="list_content" id="div#list">
                    </div>
                    <div class="controls noselect">
                        <div id="prev"><i class="fa-solid fa-angle-left"></i>previous</div>
                        <div class="hidden" id="start">1</div>
                        <div class="hidden" id="start_split">...</div>
                        <div id="current">10</div>
                        <div id="end_split">...</div>
                        <div id="end">99</div>
                        <div id="next">next<i class="fa-solid fa-angle-right"></i></div>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
