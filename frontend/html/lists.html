<!DOCTYPE html>
<html lang="en">
    <head>
        <title>backtrace | Lists</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/files/lists.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="/files/icon.ico">
        <script src="/files/global.js" defer></script>
        <script src="/files/lists.js" defer></script>
        <script src="/files/fuzzy_search.js" defer></script>
    </head>
    <body>
        <div id="dialogue" class="dialogue" data-id="">
            <div class="settings">
                <div id="d#close" class="close"><i class="fa-solid fa-xmark"></i></div>
                <span><p>backtrace</p></span>
                <h2>Edit</h2>
                <p>Name</p>
                <input type="text" id="d#name">
                <p>Note</p>
                <input type="text" id="d#note">
                <p>State</p>
                <!-- <input type="text" id="d#state"> -->
                <div id="d#dropdown" class="dropdown">
                    <span id="d#state"></span>
                    <div class="content">
                        <p id="dc#finished" class="finished">Finished</p>
                        <p id="dc#watching" class="watching">Watching</p>
                        <p id="dc#planned" class="planned">Planned</p>
                        <p id="dc#dropped" class="dropped">Dropped</p>
                    </div>
                </div>
                <button id="d#save">Save</button>
                <button class="delete" id="d#delete">Delete</button>
            </div>
            <div class="background"></div>
        </div>
        <div id="ver"></div>
        <div class="topbar">
            <div class="route">
                <a href="/home">BACKTRACE</a>
                <p>/</p>
                <p>LISTS</p>
            </div>
            <div class="profile">
                <img id="i#pfp">
            </div>
        </div>
        <div class="content">
            <div class="filters noselect">
                <div class="selector">
                    <a id="fs#anime" href="#anime">Anime</a>
                    <a id="fs#manga" href="#manga">Manga</a>
                </div>
                <div class="type noselect">
                    <p id="ft#finished" class="finished">Finished</p>
                    <p id="ft#watching" class="watching">Watching</p>
                    <p id="ft#planned" class="planned">Planned</p>
                    <p id="ft#dropped" class="dropped">Dropped</p>
                </div>
                <div class="search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="f#search" autocapitalize="off" autocomplete="off" autocorrect="off" placeholder="sailor moon">
                </div>
                <div class="sort">
                    <p id="fsort#added" class="selected">Added</p>
                    <p id="fsort#alphabetical">Alphabetical</p>
                    <p id="fsort#type">Type</p>
                </div>
                <div class="add">
                    <button id="f#add"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            <div id="list" class="list">
            </div>
        </div>
    </body>
</html>
